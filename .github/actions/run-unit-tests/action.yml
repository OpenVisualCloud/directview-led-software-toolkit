name: 'Run Unit Tests'
description: 'Execute unit tests and save results to test-reports/'

runs:
  using: composite
  steps:
    - name: Execute unit tests
      shell: bash
      run: |
        echo "Executing Unit Tests..."
        mkdir -p "$GITHUB_WORKSPACE/test-reports"
        ./scripts/test.sh 2>&1 | tee "$GITHUB_WORKSPACE/test-reports/unit-test-results.txt"
        echo "Unit Tests executed successfully"
