name: 'Coverity Scan'
description: 'Download, install, and run Coverity static analysis'

inputs:
  artifactory-user:
    description: 'Artifactory username for Coverity download'
    required: true
  artifactory-password:
    description: 'Artifactory password for Coverity download'
    required: true

runs:
  using: composite
  steps:
    - name: Coverity Download and Installation
      shell: bash
      env:
        ARTIFACTORY_USER: ${{ inputs.artifactory-user }}
        ARTIFACTORY_PASSWORD: ${{ inputs.artifactory-password }}
        NO_PROXY: "intel.com,.intel.com,localhost,127.0.0.1"
      run: |
        export no_proxy="$NO_PROXY"
        if [ -f "$HOME/coverity/bin/cov-build" ]; then
          echo "Coverity already installed at $HOME/coverity, skipping download and install."
          exit 0
        fi
        if [ -z "$ARTIFACTORY_USER" ] || [ -z "$ARTIFACTORY_PASSWORD" ]; then
          echo "ERROR: COVERITY_ARTIFACTORY_USER / COVERITY_ARTIFACTORY_PASSWORD secrets are not set on this runner."
          exit 1
        fi

        # Pick a non-snap downloader. Snap-confined curl ignores --noproxy/NO_PROXY
        # and routes everything through the DMZ proxy, which blocks internal hosts.
        # Prefer wget over curl as --no-proxy is more reliable on corporate runners.
        WGET_BIN=""
        for w in /usr/bin/wget /bin/wget; do
          if [ -x "$w" ] && ! readlink -f "$w" | grep -q '/snap/'; then
            WGET_BIN="$w"; break
          fi
        done
        CURL_BIN=""
        if [ -z "$WGET_BIN" ]; then
          for c in /usr/bin/curl /bin/curl; do
            if [ -x "$c" ] && ! readlink -f "$c" | grep -q '/snap/'; then
              CURL_BIN="$c"; break
            fi
          done
        fi
        if [ -z "$CURL_BIN" ] && [ -z "$WGET_BIN" ]; then
          echo "ERROR: No non-snap curl or wget available on this runner."
          echo "Install with: sudo apt-get install -y curl wget   (and: sudo snap remove curl)"
          exit 1
        fi
        echo "Using downloader: ${WGET_BIN:-$CURL_BIN}"

        cd "$HOME"
        BASE_URL="https://ubit-artifactory-or.intel.com/artifactory/coverity-or-local/Enterprise"
        for f in cov-analysis-linux64-2025.3.0.sh license.dat; do
          echo "Downloading $f ..."
          if [ -n "$WGET_BIN" ]; then
            "$WGET_BIN" --no-check-certificate --no-proxy \
              --user="$ARTIFACTORY_USER" --password="$ARTIFACTORY_PASSWORD" \
              -O "$f" "$BASE_URL/$f" || {
                echo "ERROR: wget failed to download $f"
                exit 1
              }
          else
            # --proxy "" forcibly disables any proxy regardless of env vars
            HTTP_CODE=$("$CURL_BIN" -k -sS -L --proxy "" \
              -w "%{http_code}" -o "$f" \
              -u "$ARTIFACTORY_USER:$ARTIFACTORY_PASSWORD" \
              "$BASE_URL/$f")
            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERROR: Failed to download $f (HTTP $HTTP_CODE)."
              echo "  401 = bad creds, 403 = no permission OR proxy blocked (DMZ proxy denies internal hosts)."
              exit 1
            fi
          fi
        done
        chmod 755 cov-analysis-linux64-2025.3.0.sh
        ./cov-analysis-linux64-2025.3.0.sh -q \
          --installation.dir=$HOME/coverity \
          --license.agreement=agree \
          --license.region=0 \
          --license.type.choice=0 \
          --license.cov.path=$HOME/license.dat

    - name: Set up MTL environment
      shell: bash
      run: |
        if pkg-config --exists mtl 2>/dev/null; then
          echo "MTL already discoverable via pkg-config"
          exit 0
        fi
        MTL_PC=$(find /usr /home /opt -name "mtl.pc" 2>/dev/null | head -1)
        if [ -z "$MTL_PC" ]; then
          echo "ERROR: MTL pkg-config file not found under /usr, /home, or /opt."
          echo "Please ensure Media Transport Library is built and installed on the runner."
          exit 1
        fi
        MTL_PC_DIR=$(dirname "$MTL_PC")
        echo "Found MTL pkgconfig at: $MTL_PC_DIR"
        echo "PKG_CONFIG_PATH=${MTL_PC_DIR}:${PKG_CONFIG_PATH}" >> "$GITHUB_ENV"

    - name: Coverity Scan
      shell: bash
      env:
        COV_USER: ${{ inputs.artifactory-user }}
        COV_PASSWORD: ${{ inputs.artifactory-password }}
      run: |
        cd "$GITHUB_WORKSPACE"

        # Configure Coverity for gcc/g++/cc (template covers all variants)
        $HOME/coverity/bin/cov-configure --gcc
        # Also configure 'cc' explicitly since meson uses cc
        $HOME/coverity/bin/cov-configure --compiler cc --comptype gcc --template

        # Clean and setup meson build directory
        rm -rf build coverity_output
        meson setup build

        # Run cov-build wrapping the ninja compilation
        $HOME/coverity/bin/cov-build --dir coverity_output/ ninja -C build

        # Analyze captured build
        $HOME/coverity/bin/cov-analyze --dir coverity_output/ \
          --webapp-security \
          --enable-audit-checkers \
          --enable-default

        # Commit defects to Coverity server
        $HOME/coverity/bin/cov-commit-defects --dir coverity_output/ \
          --url https://coverity.devtools.intel.com/prod3 \
          --stream Garden_Cove_NEXT \
          --user "$COV_USER" \
          --password "$COV_PASSWORD"

        # Generate JSON report
        $HOME/coverity/bin/cov-format-errors --dir coverity_output/ \
          --json-output-v8 coverity_dir_result.json
