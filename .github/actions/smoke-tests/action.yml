name: 'Smoke Tests'
description: 'Run smoke tests on dvledtx-ffmpeg and dvledtx-mtl binaries. Results written to $GITHUB_WORKSPACE/reports/'

runs:
  using: composite
  steps:
    - name: Smoke test
      shell: bash
      run: |
        REPORT_DIR="$GITHUB_WORKSPACE/reports"
        mkdir -p "$REPORT_DIR"

        for BINARY in ./bins/dvledtx-ffmpeg ./bins/dvledtx-mtl; do
          NAME=$(basename "$BINARY")
          echo "===== Smoke Test: $NAME ====="
          OUTFILE="$REPORT_DIR/smoke-test-${NAME}.txt"
          {
            echo "--- Binary info ---"
            file "$BINARY"
            echo ""
            echo "--- Shared library dependencies ---"
            ldd "$BINARY" || true
          } | tee "$OUTFILE"

          # Verify binary is a valid ELF executable
          if ! file "$BINARY" | grep -q "ELF.*executable"; then
            echo "ERROR: $NAME is not a valid ELF executable."
            exit 1
          fi

          # Verify all shared library dependencies resolve
          if ldd "$BINARY" 2>&1 | grep -q "not found"; then
            echo "ERROR: $NAME has unresolved shared library dependencies:"
            ldd "$BINARY" | grep "not found"
            exit 1
          fi

          echo "  [OK] $NAME passed smoke test."
        done

