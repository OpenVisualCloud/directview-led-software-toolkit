name: 'Smoke Test'
description: 'Run a quick smoke test on the dvledtx binary. Result written to $GITHUB_WORKSPACE/reports/smoke-test.txt'

runs:
  using: composite
  steps:
    - name: Smoke test
      shell: bash
      run: |
        REPORT_DIR="$GITHUB_WORKSPACE/reports"
        mkdir -p "$REPORT_DIR"

        echo "Running dvledtx smoke test (5s timeout)..."
        timeout 5s ./build/dvledtx --help > "$REPORT_DIR/smoke-test.txt" 2>&1 || true

        # Verify it produced output (i.e. it started and didn't segfault silently)
        if [ ! -s "$REPORT_DIR/smoke-test.txt" ]; then
          echo "ERROR: dvledtx produced no output during smoke test."
          exit 1
        fi
        echo "Smoke test passed. Output:"
        cat "$REPORT_DIR/smoke-test.txt"
