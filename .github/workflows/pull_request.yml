name: Pull Request

on:
  pull_request:
    types: [assigned, opened, synchronize, reopened]
    branches-ignore:
      - main

  push:

  workflow_dispatch:

jobs:
  build:
    name: Pull Request
    runs-on: self-hosted

    steps:
      - name: Clean up previous run
        run: |
          echo "Cleaning up previous run"
          rm -rf "${{ github.workspace }}/build"
          find "${{ github.workspace }}" -mindepth 1 -maxdepth 1 ! -name 'build' -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Build dvledtx
        uses: ./.github/actions/build-dvledtx

      - name: Smoke test
        uses: ./.github/actions/smoke-tests

      # - name: Upload binary
      #   uses: actions/upload-artifact@v4
      #   if: always()
      #   with:
      #     name: pr-binary-${{ github.run_id }}
      #     path: build/dvledtx
      #     retention-days: 30

  unit-tests:
    name: Unit Tests
    runs-on: self-hosted

    steps:
      - name: Clean up previous run
        run: |
          find "${{ github.workspace }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Run unit tests
        uses: ./.github/actions/unit-tests

      - name: Upload unit test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-unit-tests-${{ github.run_id }}
          path: ${{ github.workspace }}/test-reports/
          retention-days: 1

  static-analysis:
    name: Static Analysis
    runs-on: self-hosted

    steps:
      - name: Clean up previous run
        run: |
          find "${{ github.workspace }}" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Environment check
        uses: ./.github/actions/environment-check

      - name: Static analysis
        uses: ./.github/actions/static-analysis

      - name: Upload static analysis reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-static-analysis-${{ github.run_id }}
          path: ${{ github.workspace }}/reports/
          retention-days: 1

  collect-artifacts:
    name: Collect All Artifacts
    runs-on: self-hosted
    needs: [build, unit-tests, static-analysis]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: pr-*-${{ github.run_id }}
          path: all-artifacts
          merge-multiple: true

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4
        with:
          name: dvledtx-pr-artifacts-${{ github.run_id }}
          path: all-artifacts/
          retention-days: 30
